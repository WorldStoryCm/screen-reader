name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_target: aarch64-apple-darwin
            config_path: src-tauri/tauri.macos.conf.json
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_target: x86_64-apple-darwin
            config_path: src-tauri/tauri.macos.conf.json
          - platform: windows-latest
            args: ""
            rust_target: ""
            config_path: src-tauri/tauri.windows.conf.json

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # macOS: compile Vision OCR Swift binary
      - name: Build Vision OCR (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p src-tauri/bin
          swiftc -O -o src-tauri/bin/vision_ocr src-tauri/swift/vision_ocr.swift \
            -framework Vision -framework AppKit -framework CoreGraphics -framework ImageIO

      # Windows: build standalone OCR exe with RapidOCR + PyInstaller
      - name: Setup Python (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build OCR binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd python
          pip install rapidocr-onnxruntime pyinstaller pillow
          python build_ocr.py
          # Copy the bundled OCR into src-tauri for resource bundling
          Copy-Item -Recurse -Force dist/ocr_service ../src-tauri/ocr_service

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Screen Reader ${{ github.ref_name }}"
          releaseBody: |
            ## Download
            - **Windows**: `.msi` installer or `.exe` setup
            - **macOS (Apple Silicon)**: `aarch64.dmg`
            - **macOS (Intel)**: `x86_64.dmg`

            Windows uses RapidOCR (PaddleOCR-based) for high quality Japanese + English text recognition.
          releaseDraft: true
          prerelease: false
          configPath: ${{ matrix.config_path }}
          args: ${{ matrix.args }}
